server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /sos {
        proxy_pass http://backend:5000;
    }

    location /reports {
        proxy_pass http://backend:5000;
    }

    location /signup {
        proxy_pass http://backend:5000;
    }

    location /auth {
        proxy_pass http://backend:5000;
    }

    location /api {
        proxy_pass http://backend:5000;
    }
}