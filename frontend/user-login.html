<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Login | Crime Hotspot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <div class="back-link"><a href="index.html">&larr; Back to Portal</a></div>
            <h1>Public Login</h1>
            <p>Access the community dashboard and hotspot analytics.</p>
            <form id="userLoginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="switch-form">Don't have an account? <a href="signup.html">Sign Up</a></p>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
