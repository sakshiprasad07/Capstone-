<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard | Crime Hotspot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="logo">
                <h2 style="font-weight: 800; letter-spacing: -1px;">CRIME<span
                        style="color: var(--primary);">HOTSPOT</span></h2>
            </div>
            <div class="nav-links">
                <a href="#" class="report-btn">Report a Crime</a>
                <a href="index.html" id="logoutBtn"
                    style="color: var(--text-gray); text-decoration: none; align-self: center;">Logout</a>
            </div>
        </nav>

        <main class="map-placeholder" id="map">
            <div class="map-overlay-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    style="display: block; margin: 0 auto 20px; opacity: 0.3;">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
                Interactive Map Loading...
            </div>
        </main>

        <!-- SOS Button -->
        <button class="sos-btn" id="sosBtn">SOS</button>

        <!-- SOS Confirmation Modal -->
        <div class="modal-overlay" id="sosModal">
            <div class="modal-content">
                <div style="color: var(--emergency); margin-bottom: 1.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                        </path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h3>Send Emergency SOS?</h3>
                <p>This will send your current location and an emergency request to nearby police personnel. Are you
                    sure?</p>
                <div class="modal-actions">
                    <button class="modal-btn cancel-sos" id="cancelSos">Cancel</button>
                    <button class="modal-btn confirm-sos" id="confirmSos">Confirm SOS</button>
                </div>
            </div>
        </div>
    </div>

    <script src="user-landing.js"></script>
</body>

</html>
