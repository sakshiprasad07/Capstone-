<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Hotspot | Portal Selection</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="landing-container">
        <header class="landing-header">
            <h1>Crime Hotspot Portal</h1>
            <p>Welcome to the analytics dashboard. Please select your access point.</p>
        </header>

        <div class="selection-grid">
            <a href="police-login.html" class="selection-card police">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <h2>Police Personnel</h2>
                <p>Secure login for law enforcement officers and administrators.</p>
                <span class="action-text">Access Portal &rarr;</span>
            </a>

            <a href="user-login.html" class="selection-card public">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <h2>Public User</h2>
                <p>Login to view hotspots, reports, and community insights.</p>
                <span class="action-text">Citizen Portal &rarr;</span>
            </a>
        </div>
    </div>
</body>

</html>
