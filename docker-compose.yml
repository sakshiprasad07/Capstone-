version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: crime_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000

  backend:
    build: ./backend
    container_name: crime_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/capstone
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo

  mongo:
    image: mongo
    container_name: crime_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  jenkins:
    image: jenkins/jenkins:lts
    container_name: crime_jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    restart: unless-stopped

volumes:
  mongo_data:
  jenkins_home: